<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת ניהול מלאי - מרכז הובלה</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- פונט רוביק -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome לאייקונים -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Rubik', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-enter { animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col antialiased pb-20 md:pb-0">

    <!-- שורת סטטוס עליונה עם קרדיט -->
    <div class="bg-slate-900 border-b border-slate-800 text-[10px] sm:text-xs py-2 px-4 sm:px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center gap-2">
            <div class="flex items-center gap-2 text-slate-400">
                <span id="connection-indicator-dot" class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
                <span id="connection-indicator-text" class="font-medium">סטטוס: מחובר לשרת</span>
            </div>
            <div class="text-slate-500 font-medium truncate max-w-[50%]">
                פותח ואופיין ע"י סרן במיל' אלעד שושן
            </div>
        </div>
    </div>

    <!-- כותרת ראשית ולוגו -->
    <header class="bg-slate-900/80 border-b border-slate-800 py-3 sm:py-4 px-4 sm:px-6 sticky top-0 z-40 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
             <div class="flex items-center gap-3 sm:gap-4">
                <div class="bg-white p-1 rounded-xl shadow-[0_0_15px_rgba(59,130,246,0.15)] border border-slate-700/50 flex items-center justify-center w-12 h-12 sm:w-14 sm:h-14 shrink-0">
                    <img src="Logo_hovala_new.png" alt="לוגו מרכז הובלה" class="h-full w-full object-contain">
                </div>
                <div>
                     <h1 class="text-lg sm:text-xl font-black text-white tracking-tight leading-tight">מלאי מרכז הובלה</h1>
                    <p class="text-blue-400 text-[10px] sm:text-xs font-medium">ניהול ציוד מתקדם בזמן אמת</p>
                </div>
            </div>
            
             <div class="flex items-center gap-2">
                <button id="admin-add-item-btn-desktop" onclick="toggleAddItemModal()" class="hidden md:flex bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all text-white font-bold px-4 py-2 rounded-xl items-center gap-2 text-xs shadow-lg shadow-blue-600/20 admin-action-col">
                    <i class="fa-solid fa-circle-plus"></i> הוסף פריט
                </button>
                <button id="admin-login-btn" onclick="toggleAdminLoginModal()" class="bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all text-white font-medium px-3 sm:px-4 py-2 rounded-xl flex items-center gap-2 text-xs border border-slate-700">
                    <i class="fa-solid fa-user-shield"></i> ניהול
                </button>
                <button id="admin-logout-btn" onclick="adminLogout()" class="hidden bg-rose-500/10 hover:bg-rose-500/20 active:scale-95 transition-all text-rose-400 font-medium px-3 sm:px-4 py-2 rounded-xl items-center gap-2 text-xs border border-rose-500/30 admin-action-col">
                    <i class="fa-solid fa-right-from-bracket"></i> יציאה
                </button>
                <button onclick="fetchLiveSheetData()" class="bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all text-white font-medium w-9 h-9 sm:w-auto sm:px-4 sm:py-2 rounded-xl flex items-center justify-center gap-2 text-xs border border-slate-700">
                    <i id="sync-icon" class="fa-solid fa-rotate"></i> <span class="hidden sm:inline">רענן</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 flex-1 w-full grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <!-- עמודת חיפוש וסטטיסטיקה -->
        <div class="lg:col-span-1 space-y-4 sm:space-y-6">
            <div class="bg-slate-900 border border-slate-800 p-4 sm:p-5 rounded-2xl shadow-xl">
                <h3 class="font-bold text-sm mb-4 text-white flex items-center gap-2">
                    <i class="fa-solid fa-magnifying-glass text-blue-400"></i> חיפוש חכם
                </h3>
                <div class="relative mb-4">
                    <input type="text" id="searchInput" oninput="filterData()" placeholder="חפש פריט, מכולה..." 
                           class="w-full pl-3 pr-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-xs sm:text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                </div>
                <div class="grid grid-cols-2 lg:grid-cols-1 gap-2.5 text-xs">
                    <div class="p-3 bg-slate-950 rounded-xl border border-slate-800/80 flex flex-col justify-center">
                       <span class="text-slate-500 text-[10px] font-medium mb-0.5">סה"כ פריטים במלאי</span>
                        <span id="totalItems" class="font-black text-white text-base">0</span>
                    </div>
                    <div class="p-3 bg-slate-950 rounded-xl border border-slate-800/80 flex flex-col justify-center">
                         <span class="text-slate-500 text-[10px] font-medium mb-0.5">תוצאות חיפוש</span>
                        <span id="filteredItems" class="font-black text-amber-400 text-base">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- עמודת תוכן מרכזית -->
        <div class="lg:col-span-3 space-y-4">
            <div class="bg-slate-900 border border-slate-800 p-2 sm:p-3 rounded-2xl flex flex-col sm:flex-row items-center justify-between gap-3 shadow-xl">
                <div class="w-full sm:w-auto overflow-x-auto hide-scrollbar pb-1 sm:pb-0">
                    <div class="flex gap-1.5 min-w-max px-1">
                        <button onclick="selectCategory('all')" id="tab-all" class="tab-btn px-4 py-2 text-xs font-semibold rounded-xl bg-blue-600 text-white shadow-md transition-all active:scale-95">הכל</button>
                        <button onclick="selectCategory('תשורות')" id="tab-תשורות" class="tab-btn px-4 py-2 text-xs font-medium rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all active:scale-95">תשורות</button>
                        <button onclick="selectCategory('חשמל')" id="tab-חשמל" class="tab-btn px-4 py-2 text-xs font-medium rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all active:scale-95">חשמל</button>
                        <button onclick="selectCategory('ספר')" id="tab-ספר" class="tab-btn px-4 py-2 text-xs font-medium rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all active:scale-95">ספרים</button>
                        <button onclick="selectCategory('ערכת נהג')" id="tab-ערכת נהג" class="tab-btn px-4 py-2 text-xs font-medium rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all active:scale-95">ערכת נהג</button>
                    </div>
                </div>
                <div class="bg-slate-950 p-1 rounded-xl border border-slate-800 flex items-center gap-1 shrink-0 w-full sm:w-auto justify-center">
                    <button onclick="switchView('grid')" id="view-btn-grid" class="flex-1 sm:flex-none px-4 py-1.5 rounded-lg text-xs font-bold bg-slate-800 text-white transition-all flex items-center justify-center gap-1.5"><i class="fa-solid fa-grip"></i> גלריה</button>
                    <button onclick="switchView('table')" id="view-btn-table" class="flex-1 sm:flex-none px-4 py-1.5 rounded-lg text-xs font-medium text-slate-500 hover:text-slate-200 transition-all flex items-center justify-center gap-1.5"><i class="fa-solid fa-list"></i> טבלה</button>
                </div>
            </div>

            <div id="table-loader" class="py-24 flex flex-col items-center justify-center">
                <div class="relative w-12 h-12">
                    <div class="absolute inset-0 rounded-full border-t-2 border-blue-500 animate-spin"></div>
                    <div class="absolute inset-2 rounded-full border-r-2 border-amber-500 animate-spin" style="animation-direction: reverse; animation-duration: 0.7s;"></div>
                </div>
            </div>

            <div id="table-view-container" class="hidden bg-slate-900 border border-slate-800 rounded-2xl shadow-xl overflow-hidden">
                <div class="overflow-x-auto"><table class="w-full text-right border-collapse text-xs min-w-[650px]"><tbody id="inventoryTableBody"></tbody></table></div>
            </div>

            <div id="grid-view-container" class="hidden grid grid-cols-2 sm:grid-cols-2 xl:grid-cols-3 gap-3 sm:gap-5"></div>
        </div>
    </main>

    <!-- מודלים ועזרים נשארים ללא שינוי מבני... -->

    <script>
        // הקוד הלוגי נשאר כפי שסוכם, מוודא ש-supabaseClient מוגדר נכון
        const SUPABASE_URL = "https://gumrukucfdbwibmjvqlb.supabase.co";

</body>
</html>
