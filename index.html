<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת ניהול מלאי - מרכז הובלה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Rubik', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-enter { animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col antialiased pb-20 md:pb-0">

    <!-- שורת סטטוס עליונה -->
    <div class="bg-slate-900 border-b border-slate-800 text-[10px] sm:text-xs py-2 px-4 sm:px-6 flex justify-between items-center">
        <div class="flex items-center gap-2 text-slate-400">
            <span id="connection-indicator-dot" class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
            <span id="connection-indicator-text" class="font-medium">סטטוס: מחובר לשרת</span>
        </div>
        <div class="text-slate-500 font-medium truncate">פותח ואופיין ע"י סרן במיל' אלעד שושן</div>
    </div>

    <!-- כותרת ראשית -->
    <header class="bg-slate-900/80 border-b border-slate-800 py-3 px-4 sm:px-6 sticky top-0 z-40 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-white p-1 rounded-xl shadow-lg border border-slate-700/50 w-12 h-12 sm:w-14 sm:h-14 flex items-center justify-center shrink-0">
                    <img src="Logo_hovala_new.png" alt="לוגו" class="h-full w-full object-contain">
                </div>
                <div>
                     <h1 class="text-lg sm:text-xl font-black text-white leading-tight">מלאי מרכז הובלה</h1>
                    <p class="text-blue-400 text-[10px] sm:text-xs font-medium">ניהול ציוד בזמן אמת</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="admin-login-btn" onclick="toggleAdminLoginModal()" class="bg-slate-800 px-3 py-2 rounded-xl text-xs"><i class="fa-solid fa-user-shield"></i> ניהול</button>
                <button id="admin-logout-btn" onclick="adminLogout()" class="hidden bg-rose-500/10 text-rose-400 px-3 py-2 rounded-xl text-xs"><i class="fa-solid fa-right-from-bracket"></i> יציאה</button>
                <button onclick="fetchLiveSheetData()" class="bg-slate-800 px-3 py-2 rounded-xl text-xs"><i class="fa-solid fa-rotate"></i></button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 space-y-4">
        <div id="table-loader" class="py-20 text-center"><div class="animate-spin inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full"></div></div>
        <div id="grid-view-container" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
    </main>

    <!-- מודלים ועזרים -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-full shadow-xl opacity-0 transition-opacity z-50 text-xs"></div>

    <script>
        const SUPABASE_URL = "https://gumrukucfdbwibmjvqlb.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1bXJ1a3VjZmRid2libWp2cWxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwODc3NDYsImV4cCI6MjA5ODY2Mzc0Nn0.BTyxqd_WbGTaFY0qqm5Ck23fu1pNIahTww9gXoeFbIE";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const ADMIN_PASSWORD_HASH = "8714441"; 

        let isAdmin = sessionStorage.getItem('mhasan_is_admin') === 'true';
        let inventoryData = [];

        async function fetchLiveSheetData() {
            try {
                const { data, error } = await supabaseClient.from('inventory').select('*');
                if (error) throw error;
                inventoryData = data;
                render();
            } catch (err) { showToast("שגיאה בטעינה", true); }
        }

        function render() {
            const container = document.getElementById('grid-view-container');
            document.getElementById('table-loader').classList.add('hidden');
            container.innerHTML = inventoryData.map(item => `
                <div class="bg-slate-900 border border-slate-800 p-3 rounded-2xl">
                    <img src="${item.image_url || 'https://placehold.co/200x100/1e293b/white?text=No+Img'}" class="h-24 w-full object-cover rounded-lg mb-2">
                    <h3 class="font-bold text-sm truncate">${item.name}</h3>
                    <p class="text-xs text-blue-400">כמות: ${item.quantity}</p>
                </div>
            `).join('');
        }

        function toggleAdminLoginModal() { /* לוגיקה קיימת */ }
        function attemptAdminLogin() { 
            const pass = document.getElementById('adminLoginPasswordField').value;
            if (pass === ADMIN_PASSWORD_HASH) { isAdmin = true; sessionStorage.setItem('mhasan_is_admin', 'true'); updateAdminUI(); showToast("מחובר!"); }
        }
        function adminLogout() { isAdmin = false; sessionStorage.removeItem('mhasan_is_admin'); updateAdminUI(); }
        function updateAdminUI() { /* לוגיקת הצגת כפתורים */ }
        function showToast(msg, isErr = false) { 
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }
        
        document.addEventListener('DOMContentLoaded', fetchLiveSheetData);
    </script>
</body>
</html>
